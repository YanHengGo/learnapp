# ログイン共通サブフロー
# 他のフローから runFlow で呼び出す
# 前提: clearState済みでアプリ起動済み
appId: com.yanheng.learnapp
---
- assertVisible: "学習管理アプリ"
- tapOn: "メールアドレス"
- inputText: ${TEST_EMAIL}
- tapOn: "パスワード"
- inputText: ${TEST_PASSWORD}
- hideKeyboard
- tapOn:
    id: "authSubmitButton"
- assertVisible:
    text: "子ども一覧"
