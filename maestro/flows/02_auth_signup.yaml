# ========================================
# 02 認証 - サインアップフロー
# ========================================
# テスト内容:
#   1. ログイン ↔ サインアップ タブ切り替え
#   2. サインアップフォームの表示確認
# NOTE: 実際の登録はサーバー側にデータが残るため
#       手動テストまたはテスト用ダミーアカウントで実施推奨
# ========================================
appId: com.yanheng.learnapp
---

- stopApp
- launchApp
- waitForAnimationToEnd

# すでにログイン済みの場合はログアウト
- runFlow:
    when:
      visible: "子ども一覧"
    file: ../subflows/logout.yaml

- assertVisible: "学習管理アプリ"
- assertVisible: "ログイン"

# サインアップへ切り替え
- tapOn: "アカウントをお持ちでない方はこちら"
- assertVisible: "新規登録"
- assertVisible: "メールアドレス"
- assertVisible: "パスワード"

# ログインへ戻す
- tapOn: "すでにアカウントをお持ちの方はこちら"
- assertVisible: "ログイン"
- assertNotVisible: "新規登録"
