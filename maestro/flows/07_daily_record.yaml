# ========================================
# 07 日々の記録フロー
# ========================================
# テスト内容:
#   1. 日々の記録画面表示
#   2. 日付ナビゲーション（前の日・次の日）
#   3. タスクのチェックオン・オフ
#   4. 学習時間の入力と保存
# NOTE: タスクが登録済みであることが前提
# ========================================
appId: com.learn.app
---

- launchApp:
    clearState: true

- runFlow: ../subflows/login.yaml

# 最初の子どもを選択
- tapOn:
    index: 0
    below: "子ども一覧"

- assertVisible:
    text: "日々"
    timeout: 10000

# 日々タブはデフォルト表示
- assertVisible: "日々の記録"

# --- 日付ナビゲーション ---
- tapOn:
    description: "前の日"
- waitForAnimationToEnd

- tapOn:
    description: "次の日"
- waitForAnimationToEnd

# --- タスクが存在する場合のテスト ---
# タスクがない場合は "この日のタスクはありません" が表示される
- runFlow:
    file: ../subflows/daily_with_tasks.yaml
    when:
      notVisible: "この日のタスクはありません"
