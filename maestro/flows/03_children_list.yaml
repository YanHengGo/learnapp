# ========================================
# 03 子ども一覧フロー
# ========================================
# テスト内容:
#   1. ログイン後に子ども一覧が表示される
#   2. 子どもカードをタップ → HomeScreen へ遷移
#   3. バック操作 → 子ども一覧に戻る
# ========================================
appId: com.learn.app
---

- launchApp:
    clearState: true

- runFlow: ../subflows/login.yaml

# 子ども一覧の表示確認
- assertVisible: "子ども一覧"

# 最初の子どもを選択して HomeScreen へ遷移
- tapOn:
    index: 0
    below: "子ども一覧"

# BottomNav が表示されること（HomeScreen に遷移した証拠）
- assertVisible:
    text: "日々"
    timeout: 10000
- assertVisible: "タスク"
- assertVisible: "集計"

# バックで子ども一覧へ戻る
- back
- assertVisible:
    text: "子ども一覧"
    timeout: 5000
