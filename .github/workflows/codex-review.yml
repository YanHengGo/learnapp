name: Codex Review

on:
  workflow_dispatch:
  pull_request:

jobs:
  codex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Please review this pull request and suggest improvements.